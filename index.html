<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Prompt Pro | Fix</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [theme, setTheme] = useState('');
            const [channel, setChannel] = useState('');
            const [duration, setDuration] = useState(30);
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(null);

            // IMPORTANTE: Insira sua chave aqui ou crie um campo de input para ela
            const apiKey = "SUA_CHAVE_AQUI"; 

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [results, loading, error]);

            const generate = async () => {
                if (!theme) return;
                setLoading(true);
                setError(null);
                setResults(null);

                const numSteps = Math.ceil(duration / 10);
                
                // Prompt otimizado para retorno JSON estrito
                const payload = {
                    contents: [{
                        parts: [{
                            text: `Gere um roteiro de ${duration}s sobre "${theme}" para o canal "${channel || 'meu canal'}". 
                            Retorne APENAS um objeto JSON com esta estrutura exata:
                            {
                              "steps": [{"prompt": "descrição da imagem em inglês", "script": "narração em português"}],
                              "tiktok": {"description": "legenda", "hashtags": ["#tag1"]}
                            }
                            Gere exatamente ${numSteps} steps. Os prompts de imagem devem ser detalhados, cinematic e em inglês.`
                        }]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                try {
                    // URL Corrigida para a versão estável 1.5 Flash
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        }
                    );

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || `Erro ${response.status}`);
                    }

                    const rawText = data.candidates[0].content.parts[0].text;
                    setResults(JSON.parse(rawText));
                } catch (err) {
                    setError(err.message.includes("API key") ? "Chave de API Inválida ou não configurada." : err.message);
                } finally {
                    setLoading(false);
                }
            };

            const copy = (text, idx) => {
                navigator.clipboard.writeText(text);
                setCopied(idx);
                setTimeout(() => setCopied(null), 2000);
            };

            return (
                <div className="max-w-3xl mx-auto p-6 min-h-screen">
                    <header className="flex items-center gap-4 mb-12 mt-8">
                        <div className="bg-indigo-600 p-3 rounded-2xl"><i data-lucide="video"></i></div>
                        <h1 className="text-2xl font-black uppercase tracking-tighter">Grok Prompt <span className="text-indigo-500">Pro</span></h1>
                    </header>

                    <div className="space-y-6 bg-[#0A0A0A] p-6 rounded-[2rem] border border-white/5 shadow-2xl">
                        <input 
                            placeholder="Tema do vídeo..." 
                            className="w-full bg-black border border-white/10 p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                            value={theme} onChange={e => setTheme(e.target.value)}
                        />
                        <div className="grid grid-cols-2 gap-4">
                            <input 
                                placeholder="@seu.canal" 
                                className="bg-black border border-white/10 p-4 rounded-xl outline-none"
                                value={channel} onChange={e => setChannel(e.target.value)}
                            />
                            <select 
                                className="bg-black border border-white/10 p-4 rounded-xl outline-none"
                                value={duration} onChange={e => setDuration(e.target.value)}
                            >
                                <option value="30">30 Segundos</option>
                                <option value="60">60 Segundos</option>
                            </select>
                        </div>
                        <button 
                            onClick={generate}
                            disabled={loading}
                            className="w-full bg-white text-black font-black p-4 rounded-xl hover:bg-indigo-500 hover:text-white transition-all disabled:opacity-50"
                        >
                            {loading ? "PROCESSANDO..." : "GERAR ROTEIRO MESTRE"}
                        </button>
                    </div>

                    {error && <div className="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-sm font-bold text-center">{error}</div>}

                    {results && (
                        <div className="mt-12 space-y-8 pb-20">
                            {results.steps.map((s, i) => (
                                <div key={i} className="bg-[#0A0A0A] border border-white/5 rounded-3xl p-6 animate-up relative group">
                                    <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4 block">Etapa {i+1}</span>
                                    <div className="space-y-4">
                                        <div>
                                            <p className="text-xs text-slate-500 font-bold uppercase mb-1">Prompt Grok:</p>
                                            <p className="text-slate-300 font-mono text-sm leading-relaxed">{s.prompt}</p>
                                        </div>
                                        <div className="pt-4 border-t border-white/5">
                                            <p className="text-xs text-emerald-500 font-bold uppercase mb-1">Narração:</p>
                                            <p className="text-lg font-bold italic leading-snug">"{s.script}"</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => copy(`${s.prompt}\n\n${s.script}`, i)}
                                        className="absolute top-6 right-6 p-2 bg-white/5 rounded-lg hover:bg-indigo-600 transition-colors"
                                    >
                                        <i data-lucide={copied === i ? "check" : "copy"} className="w-4 h-4"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
