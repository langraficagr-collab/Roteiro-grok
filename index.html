<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Prompt | Public Proxy Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .bg-card { background: #0A0A0A; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [theme, setTheme] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('grok_key') || '');
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);

            // Proxy público para evitar bloqueio de CORS
            const PROXY = "https://cors-anywhere.herokuapp.com/";

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [results, loading]);

            const generate = async () => {
                if (!apiKey) return setError("Adicione sua chave no topo.");
                setLoading(true);
                setError(null);

                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                try {
                    const response = await fetch(PROXY + endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Gere roteiro de vídeo sobre ${theme}. Retorne JSON: {"steps": [{"prompt": "inglês", "script": "português"}]}` }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (response.status === 403) {
                        throw new Error("Clique no link acima para ativar o Proxy Público.");
                    }

                    const data = await response.json();
                    setResults(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-xl mx-auto p-6">
                    <div className="mb-8 text-center">
                        <h1 className="text-2xl font-black text-indigo-500 uppercase">Grok Public Proxy</h1>
                        <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" className="text-[10px] text-slate-500 underline uppercase tracking-widest">
                            1. Clique aqui para autorizar o Proxy antes de usar
                        </a>
                    </div>

                    <div className="bg-card p-6 rounded-3xl space-y-4">
                        <input 
                            type="password"
                            placeholder="Sua API Key"
                            className="w-full bg-black p-3 rounded-xl border border-white/10 text-xs"
                            value={apiKey}
                            onChange={(e) => { setApiKey(e.target.value); localStorage.setItem('grok_key', e.target.value); }}
                        />
                        <input 
                            placeholder="Tema do vídeo..." 
                            className="w-full bg-black p-4 rounded-xl border border-white/10 outline-none focus:border-indigo-500"
                            value={theme} onChange={e => setTheme(e.target.value)}
                        />
                        <button 
                            onClick={generate}
                            disabled={loading}
                            className="w-full bg-indigo-600 p-4 rounded-xl font-bold hover:bg-indigo-500 transition-all"
                        >
                            {loading ? "CONECTANDO VIA PROXY..." : "GERAR AGORA"}
                        </button>
                    </div>

                    {error && <div className="mt-4 p-4 bg-red-500/10 text-red-500 text-xs rounded-xl border border-red-500/20">{error}</div>}

                    {results && (
                        <div className="mt-8 space-y-4">
                            {results.steps.map((s, i) => (
                                <div key={i} className="bg-card p-5 rounded-2xl">
                                    <p className="text-xs text-indigo-400 font-mono mb-2">{s.prompt}</p>
                                    <p className="font-bold italic">"{s.script}"</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
