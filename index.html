<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Local | Sem Chave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div id="app" class="max-w-2xl mx-auto p-6">
        <header class="mb-10 mt-6 flex justify-between items-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Grok <span class="text-indigo-500">Local</span></h1>
            <span id="status-tag" class="text-[10px] bg-zinc-800 px-2 py-1 rounded border border-white/10 text-zinc-400">AGUARDANDO</span>
        </header>

        <div id="loader" class="mb-8 hidden">
            <div class="flex justify-between text-[10px] mb-2 uppercase font-bold text-indigo-400">
                <span id="loader-text">Baixando "Cérebro" da IA...</span>
                <span id="loader-pct">0%</span>
            </div>
            <div class="w-full bg-zinc-900 h-1.5 rounded-full overflow-hidden">
                <div id="loader-fill" class="progress-bar bg-indigo-600 h-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="bg-[#0A0A0A] border border-white/10 p-6 rounded-[2rem] shadow-2xl space-y-4">
            <textarea id="theme" placeholder="Sobre o que será o vídeo?" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 h-32 resize-none"></textarea>
            
            <button id="gen-btn" class="w-full bg-white text-black font-black p-4 rounded-2xl hover:bg-indigo-500 hover:text-white transition-all">
                INICIALIZAR E GERAR
            </button>
        </div>

        <div id="output" class="mt-10 space-y-6 pb-20"></div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const btn = document.getElementById('gen-btn');
        const themeInput = document.getElementById('theme');
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const loaderFill = document.getElementById('loader-fill');
        const loaderPct = document.getElementById('loader-pct');
        const statusTag = document.getElementById('status-tag');

        let engine;

        // Configuração do modelo (Llama-3 é ótimo para roteiros)
        const selectedModel = "Llama-3-8B-Instruct-q4f32_1-MLC";

        async function initEngine() {
            if (engine) return engine;
            
            loader.classList.remove('hidden');
            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    const pct = Math.round(report.progress * 100);
                    loaderFill.style.width = `${pct}%`;
                    loaderPct.innerText = `${pct}%`;
                    if (pct === 100) statusTag.innerText = "PRONTO";
                }
            });
            return engine;
        }

        btn.onclick = async () => {
            const theme = themeInput.value;
            if (!theme) return alert("Digite um tema!");

            btn.disabled = true;
            btn.innerText = "PENSANDO...";
            statusTag.innerText = "PROCESSANDO";

            try {
                const client = await initEngine();
                
                const messages = [
                    { role: "system", content: "Você é um roteirista de vídeos curtos. Gere 3 cenas. Para cada cena forneça: 1. Prompt de imagem em inglês. 2. Narração em português. Seja direto." },
                    { role: "user", content: `Tema: ${theme}` }
                ];

                const reply = await client.chat.completions.create({ messages });
                const text = reply.choices[0].message.content;

                // Renderiza o resultado de forma simples
                output.innerHTML = `
                    <div class="bg-[#0A0A0A] border border-indigo-500/30 p-6 rounded-3xl animate-pulse">
                        <pre class="whitespace-pre-wrap font-sans text-sm leading-relaxed">${text}</pre>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                alert("Erro: Seu navegador pode não suportar WebGPU ou não ter memória suficiente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GERAR NOVAMENTE";
                statusTag.innerText = "PRONTO";
            }
        };
    </script>
</body>
</html>
