<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Logic Studio | Zero AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .logic-card { background: linear-gradient(145deg, #0a0a0a 0%, #111 100%); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="flex items-center gap-4 mb-10 border-b border-white/5 pb-8">
            <div class="bg-emerald-600 p-3 rounded-2xl shadow-lg shadow-emerald-900/20">
                <i data-lucide="cpu" class="text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase">Grok <span class="text-emerald-500">Logic</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Motor Algorítmico Local (Sem API / Sem IA)</p>
            </div>
        </header>

        <div class="space-y-4 mb-10">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] ml-1">Tema ou Palavra-Chave</label>
                <input id="themeInput" type="text" placeholder="Ex: Espaço, Cyberpunk, Natureza..." 
                    class="w-full bg-black border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            
            <button onclick="processLogic()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-emerald-500 hover:text-white transition-all active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="zap" class="w-4 h-4"></i> COMPILAR ROTEIRO AGORA
            </button>
        </div>

        <div id="results" class="space-y-6"></div>
    </div>

    <script>
        // --- DATABASE DE LÓGICA (Heurística) ---
        const ENGINE_DB = {
            styles: [
                "Cinematic 4k, hyper-realistic, volumetric lighting, unreal engine 5 render, wide shot",
                "Dark moody atmosphere, neon highlights, anamorphic lens, grainy texture, 8k resolution",
                "Ethereal lighting, soft focus background, vibrant colors, macro photography style",
                "Epic scale, dramatic shadows, intense contrast, highly detailed textures, IMAX quality"
            ],
            hooks: [
                "Você já se perguntou o que acontece quando [TEMA] encontra o desconhecido?",
                "Prepare-se para descobrir a verdade oculta sobre [TEMA].",
                "Isso é o que ninguém te contou sobre [TEMA] até agora.",
                "Imagine um mundo onde [TEMA] dita todas as regras."
            ],
            narratives: [
                "A ciência por trás disso é fascinante e assustadora ao mesmo tempo.",
                "Cada detalhe aqui foi planejado para desafiar sua percepção.",
                "A evolução desse conceito mudou tudo o que conhecemos hoje.",
                "O impacto visual é apenas o começo de uma jornada profunda."
            ]
        };

        function processLogic() {
            const theme = document.getElementById('themeInput').value || "este tema";
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            // Gerar 3 etapas baseadas em aleatoriedade controlada (Random Forest simplificado)
            for (let i = 1; i <= 3; i++) {
                const style = ENGINE_DB.styles[Math.floor(Math.random() * ENGINE_DB.styles.length)];
                let script = "";
                
                if (i === 1) script = ENGINE_DB.hooks[Math.floor(Math.random() * ENGINE_DB.hooks.length)];
                else script = ENGINE_DB.narratives[Math.floor(Math.random() * ENGINE_DB.narratives.length)];
                
                // Substituição dinâmica (Machine Learning Heurístico)
                const finalScript = script.replace("[TEMA]", theme);
                const finalPrompt = `${theme}, ${style}, sequence ${i}, masterwork.`;

                const card = `
                    <div class="logic-card p-6 rounded-[2rem] animate-up border-l-4 border-emerald-500 shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full text-emerald-400 uppercase tracking-widest">Etapa 0${i}</span>
                            <button onclick="copyText('${finalPrompt}\\n${finalScript}')" class="text-slate-500 hover:text-white transition-colors">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter mb-1">Prompt Visual (AI Ready)</p>
                                <p class="text-sm font-mono text-slate-300 leading-relaxed">${finalPrompt}</p>
                            </div>
                            <div class="pt-4 border-t border-white/5">
                                <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-tighter mb-1">Narração Sugerida</p>
                                <p class="text-lg font-bold text-white italic">"${finalScript}"</p>
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += card;
            }
            lucide.createIcons();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Copiado!");
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
