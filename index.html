<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Prompt Pro | Automação de Roteiros</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .animate-in { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Ícone para Lucide funcionar no React via CDN
        const Icon = ({ name, className }) => {
            const [iconSvg, setIconSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const svg = lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [theme, setTheme] = useState('');
            const [channel, setChannel] = useState('');
            const [duration, setDuration] = useState(30);
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [copiedIndex, setCopiedIndex] = useState(null);
            const [error, setError] = useState(null);

            const apiKey = ""; // Insira sua chave aqui ou via prompt

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [results, loading, error]);

            const copyToClipboard = (text, index) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(null), 2000);
                });
            };

            const fetchWithRetry = async (payload, maxRetries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i <= maxRetries; i++) {
                    try {
                        const response = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            }
                        );
                        if (response.ok) return await response.json();
                        if (i === maxRetries) throw new Error(`Erro na API (${response.status})`);
                    } catch (err) {
                        if (i === maxRetries) throw err;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            };

            const generatePrompts = async () => {
                if (!theme) return;
                setLoading(true);
                setError(null);
                setResults(null);

                const numSteps = Math.ceil(duration / 10);
                const systemPrompt = `Você é um especialista em Grok Imagine. Gere exatamente ${numSteps} blocos para um vídeo de ${duration}s. REGRAS: 1. Prompt de Vídeo (INGLÊS): Cinematic, 4k. 2. Narração (PORTUGUÊS): Texto magnético. 3. Responda APENAS JSON puro.`;

                const payload = {
                    contents: [{ parts: [{ text: `Tema: ${theme}. Canal: ${channel || '@meu.canal'}. Duração: ${duration}s.` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { 
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                steps: { type: "ARRAY", items: { type: "OBJECT", properties: { prompt: { type: "STRING" }, script: { type: "STRING" } }, required: ["prompt", "script"] } },
                                tiktok: { type: "OBJECT", properties: { description: { type: "STRING" }, hashtags: { type: "ARRAY", items: { type: "STRING" } } }, required: ["description", "hashtags"] }
                            },
                            required: ["steps", "tiktok"]
                        }
                    }
                };

                try {
                    const data = await fetchWithRetry(payload);
                    const content = JSON.parse(data.candidates[0].content.parts[0].text);
                    setResults(content);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen text-slate-100 p-4 md:p-8 selection:bg-indigo-500/30">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex items-center gap-4 mb-10 border-b border-white/5 pb-8">
                            <div className="bg-indigo-600 p-3 rounded-2xl shadow-xl shadow-indigo-500/20">
                                <Icon name="video" className="w-8 h-8 text-white" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tight text-white uppercase">Grok Prompt <span className="text-indigo-500">Pro</span></h1>
                                <p className="text-slate-500 text-xs font-bold uppercase tracking-[0.2em]">Automação de Roteiros</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                            <div className="md:col-span-2 space-y-2">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Tema Principal</label>
                                <input type="text" placeholder="Ex: Mistérios do Espaço" className="w-full bg-[#0A0A0A] border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" value={theme} onChange={(e) => setTheme(e.target.value)} />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Tempo</label>
                                <select value={duration} onChange={(e) => setDuration(Number(e.target.value))} className="w-full bg-[#0A0A0A] border border-white/10 rounded-2xl px-4 py-4 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer font-bold">
                                    <option value={30}>30s (3 etapas)</option>
                                    <option value={60}>60s (6 etapas)</option>
                                    <option value={90}>90s (9 etapas)</option>
                                </select>
                            </div>
                        </div>

                        <button onClick={generatePrompts} disabled={loading || !theme} className={`w-full py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3 transition-all transform shadow-2xl ${loading || !theme ? 'bg-white/5 text-slate-600' : 'bg-white text-black hover:bg-indigo-50 active:scale-95'}`}>
                            {loading ? <Icon name="refresh-cw" className="w-6 h-6 animate-spin text-indigo-600" /> : <Icon name="sparkles" className="w-6 h-6 text-indigo-600" />}
                            <span>{loading ? 'GERANDO...' : 'GERAR SEQUÊNCIA MESTRE'}</span>
                        </button>

                        {error && (
                            <div className="mt-8 p-6 bg-red-500/10 border-l-4 border-red-500 rounded-2xl text-red-400">
                                <p className="font-bold">Erro:</p>
                                <p className="text-sm">{error}</p>
                            </div>
                        )}

                        {results && (
                            <div className="mt-16 space-y-12 pb-32">
                                {results.steps.map((step, idx) => (
                                    <div key={idx} className="animate-in">
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="bg-indigo-600/10 text-indigo-400 px-3 py-1 rounded-lg font-black text-sm border border-indigo-600/20">ETAPA 0{idx + 1}</span>
                                        </div>
                                        <div className="bg-[#0A0A0A] border border-white/5 rounded-[2rem] p-8 relative">
                                            <div className="space-y-6">
                                                <div>
                                                    <span className="text-[10px] font-black text-indigo-500 uppercase block mb-2">Grok Prompt</span>
                                                    <p className="text-slate-300 font-mono text-sm">{step.prompt}</p>
                                                </div>
                                                <div className="pt-6 border-t border-white/5">
                                                    <span className="text-[10px] font-black text-emerald-500 uppercase block mb-2">Narração</span>
                                                    <p className="text-white text-lg font-bold italic">"{step.script}"</p>
                                                </div>
                                            </div>
                                            <button onClick={() => copyToClipboard(`PROMPT: ${step.prompt}\n\nNARRAÇÃO: ${step.script}`, idx)} className={`absolute top-4 right-4 p-2 rounded-xl border transition-all ${copiedIndex === idx ? 'bg-emerald-600 border-emerald-600' : 'bg-white/5 border-white/10 hover:bg-indigo-600'}`}>
                                                <Icon name={copiedIndex === idx ? "check" : "copy"} className="w-4 h-4 text-white" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
